name: "Semvi Push Scanner"
description: "Scans repositories on push for memory exposures, risky code patterns, and dependency CVEs."
inputs:
  config:
    description: "Path to the Semvi config file"
    required: false
    default: ".semvi.yml"
  github-token:
    description: "GitHub token used for issue notifications"
    required: false
    default: ""
  webhook-url:
    description: "Optional webhook URL for external notifications"
    required: false
    default: ""
  severity-threshold:
    description: "Minimum severity to fail the action"
    required: false
    default: "high"
outputs:
  report-path:
    description: "Generated markdown report path"
    value: ${{ steps.scan.outputs.report_path }}
  summary-json:
    description: "Generated JSON summary path"
    value: ${{ steps.scan.outputs.summary_json }}
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Semvi
      shell: bash
      run: pip install .
    - name: Run Semvi
      id: scan
      shell: bash
      env:
        SEMVI_CONFIG: ${{ inputs.config }}
        SEMVI_GITHUB_TOKEN: ${{ inputs.github-token }}
        SEMVI_WEBHOOK_URL: ${{ inputs.webhook-url }}
        SEMVI_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        semvi scan --repo . --report-dir .semvi-out --notify
        echo "report_path=.semvi-out/semvi-report.md" >> "$GITHUB_OUTPUT"
        echo "summary_json=.semvi-out/semvi-summary.json" >> "$GITHUB_OUTPUT"
    - name: Upload report artifacts
      uses: actions/upload-artifact@v4
      with:
        name: semvi-report
        path: .semvi-out
